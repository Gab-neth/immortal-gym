<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>IMMORTAL GYM</h1>

<!-- 🔥 DATOS ARRIBA -->

<div class="dashboard">

<div class="menu">
    <button class="btn-menu btn-primary" onclick="showTab('datos')">Mis Datos</button>
    <button class="btn-menu" onclick="showTab('planes')">Planes</button>
    <button class="btn-menu" onclick="showTab('calendario')">Calendario</button>
</div>

<div class="content">

<!-- DATOS -->
<div id="datos" class="tab">

    <h2>Mi Perfil</h2>

    <div class="profile-card" id="info"></div>

    <button class="btn-custom btn-primary" onclick="mostrarFormulario()">
        Actualizar datos
    </button>

    <div id="formActualizar" style="display:none; margin-top:15px;">
        <input id="telefonoEdit" placeholder="Nuevo teléfono">
        <input id="direccionEdit" placeholder="Nueva dirección">
        <button class="btn-custom" onclick="actualizar()">Guardar</button>
    </div>

</div>

<!-- PLANES -->
<div id="planes" class="tab" style="display:none">
    <h2>Planes</h2>

    <button class="btn-custom" onclick="verPlan('normal')">Plan Normal</button>
    <button class="btn-custom" onclick="verPlan('bimestral')">Plan Bimestral</button>
    <button class="btn-custom" onclick="verPlan('semestral')">Plan Semestral</button>
</div>

<!-- CALENDARIO -->
<div id="calendario" class="tab" style="display:none">
    <h2>Calendario</h2>

    <button class="btn-custom" onclick="cambiarMes(-1)">⬅</button>
    <button class="btn-custom" onclick="cambiarMes(1)">➡</button>

    <div id="calendar"></div>
</div>

</div>
</div>

<script src="app.js"></script>
</body>
</html>
